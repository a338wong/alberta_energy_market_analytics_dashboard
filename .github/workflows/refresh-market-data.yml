name: Refresh market data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: refresh-market-data
  cancel-in-progress: true

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python scripts/fetch_gas_data.py
          python scripts/fetch_weather_data.py
          python scripts/clean_pool_price.py
          python scripts/build_market_dataset.py

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-data-files
          path: |
            data/raw/weather_data.csv
            data/processed/market_dataset.csv
            data/processed/market_data_export.csv
