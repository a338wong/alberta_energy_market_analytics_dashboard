name: Refresh market data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: refresh-market-data
  cancel-in-progress: true

jobs:
  build-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Print trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u
          
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python scripts/fetch_gas_data.py
          python scripts/fetch_weather_data.py
          python scripts/fetch_pool_price.py
          python scripts/clean_pool_price.py
          python scripts/build_market_dataset.py

      - name: Commit updated dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/raw/pool_price_raw.csv
          git add -f data/processed/market_data_export.csv
          git add -f data/processed/market_dataset.csv
          git add -f data/raw/weather_data.csv
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update market data"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-data-files
          path: |
            data/raw/weather_data.csv
            data/processed/market_dataset.csv
            data/processed/market_data_export.csv
